name: CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.swift'
      - 'Package.swift'
  pull_request:
    branches: [main]
    paths:
      - '**/*.swift'
      - 'Package.swift'

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Build
        run: swift build -c release
